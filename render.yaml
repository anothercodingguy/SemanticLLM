services:
  # FastAPI Gateway Backend
  - type: web
    name: llm-gateway-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: OLLAMA_FALLBACK_URL
        value: http://localhost:11434/api/chat

  # Streamlit Frontend Dashboard
  - type: web
    name: llm-gateway-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: REDIS_URL
        sync: false
